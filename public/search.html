<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resultados da Busca | Guia DTCG</title>
    <meta
      name="description"
      content="Resultados da busca no guia DTCG 2025.10."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#conteudo">Pular para o conteúdo</a>
    <div class="floating-nav-shell">
      <div class="floating-nav">
        <a class="brand" href="index.html">Guia DTCG</a>
        <nav aria-label="Navegação principal">
          <ul class="nav-list">
            <li><a href="index.html">Início</a></li>
            <li><a href="formatacao.html">Formatação</a></li>
            <li><a href="types.html">Types</a></li>
            <li><a href="resolver.html">Resolver</a></li>
          </ul>
        </nav>
        <form
          class="nav-search"
          action="search.html"
          method="get"
          role="search"
          aria-label="Buscar em todo o guia"
        >
          <label class="sr-only" for="global-search-results"
            >Buscar no guia</label
          >
          <div class="search-input-wrap">
            <input
              id="global-search-results"
              name="q"
              type="search"
              placeholder="Faça uma busca"
              required
            />
            <kbd class="shortcut" aria-hidden="true"
              ><span class="shortcut-mod" data-shortcut-mod>⌘</span>K</kbd
            >
          </div>
          <button type="submit" aria-label="Buscar">
            <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
          </button>
        </form>
      </div>
    </div>

    <header class="hero">
      <div class="wrap">
        <h1>Resultados da busca</h1>
        <p class="hero__lead" id="results-meta" aria-live="polite">
          Digite um termo na busca do menu para ver resultados.
        </p>
      </div>
    </header>

    <main id="conteudo" class="wrap">
      <section>
        <div id="search-results" class="page-grid"></div>
      </section>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/init-search-results.js"></script>
    <script src="js/init-search-shortcut.js"></script>
  </body>
</html>
